name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-and-test:
    name: typecheck + test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Forbid gmail.users.messages.send
        run: |
          # Scan for actual API calls to messages.send (not comments documenting the prohibition).
          # -P enables Perl regex; the negative lookbehind skips lines that are pure comments (// or *).
          if grep -rn "messages\.send\|users\.messages\.send" apps/web/lib apps/web/app scripts/ packages/ \
               | grep -v "^\s*//" | grep -v "^\s*\*" | grep -v "^[^:]*:[0-9]*:\s*//" | grep -v "^[^:]*:[0-9]*:\s*\*"; then
            echo "ERROR: Found gmail.users.messages.send reference. AD-004 forbids any send code path."
            exit 1
          fi

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
